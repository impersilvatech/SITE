<script>
// Registar Service Worker — garante sempre ficheiros frescos do servidor
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
// Ouvir mensagem do Service Worker — recarregar quando há nova versão
navigator.serviceWorker.addEventListener('message',function(e){
  if(e.data&&e.data.type==='SW_UPDATED'){
    if(!sessionStorage.getItem('_cf_sw_reloaded')){
      sessionStorage.setItem('_cf_sw_reloaded','1');
      location.reload();
    }
  }
});
// Se catalogo.js falhou (ecrã preto) — detectar e forçar reload sem cache
window.addEventListener('load', function(){
  if(typeof LOJA_DEFAULT==='undefined'||typeof getLoja==='undefined'){
    // catalogo.js não carregou correctamente — limpar cache e recarregar
    if(!sessionStorage.getItem('_cf_reloaded')){
      sessionStorage.setItem('_cf_reloaded','1');
      if('caches' in window){
        caches.keys().then(function(keys){
          return Promise.all(keys.map(function(k){return caches.delete(k);}));
        }).then(function(){
          location.replace(location.pathname+'?_v='+Date.now());
        });
      } else {
        location.replace(location.pathname+'?_v='+Date.now());
      }
    } else {
      // Segunda tentativa falhou — NÃO remover o flag (evita loop infinito)
      // Marcar como 'failed' e mostrar erro visível ao utilizador
      sessionStorage.setItem('_cf_reloaded','failed');
      if(document.body&&!document.getElementById('_cf_load_err')){
        var d=document.createElement('div');
        d.id='_cf_load_err';
        d.style.cssText='position:fixed;inset:0;background:#0d0d1a;color:#ff6b9d;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;z-index:99999';
        d.innerHTML='<div style="font-size:2rem;margin-bottom:12px">⚠️</div><div style="font-size:1rem;font-weight:700;margin-bottom:8px">Erro ao carregar o site</div><div style="font-size:.8rem;opacity:.7;margin-bottom:20px">Verifique a sua ligação à internet e tente novamente.</div><button onclick="sessionStorage.clear();location.reload(true)" style="padding:10px 24px;background:#ff6b9d;border:none;border-radius:50px;color:#fff;font-size:.85rem;cursor:pointer">🔄 Tentar novamente</button>';
        document.body.appendChild(d);
      }
    }
  } else {
    sessionStorage.removeItem('_cf_reloaded');
  }
});
</script>

<script>(function(){
  try{
    var l=JSON.parse(localStorage.getItem('cf_loja')||'{}');
    var n=l.nome;
    if(n){
      // Aplicar imediatamente quando o elemento existir
      function _aplicarNome(){
        document.querySelectorAll('[data-loja-nome]').forEach(function(el){el.textContent=n;});
        var t=document.title;
        if(t&&t.indexOf('CONFETI')>=0)document.title=t.replace('CONFETI',n);
      }
      // Tentar imediatamente + no DOMContentLoaded como fallback
      document.addEventListener('DOMContentLoaded',_aplicarNome);
      // MutationObserver para apanhar elementos criados dinamicamente
      var obs=new MutationObserver(function(){
        var els=document.querySelectorAll('[data-loja-nome]');
        if(els.length){els.forEach(function(el){el.textContent=n;});}
      });
      obs.observe(document.documentElement,{childList:true,subtree:true});
      // Parar observer após carregar
      document.addEventListener('DOMContentLoaded',function(){obs.disconnect();});
    }
  }catch(_){}
})()</script>

<script>
(function(){
  try{
    // Se catalogo.js carregou mas a versão no URL não bate certo com cf_versao → recarregar
    var scripts=document.querySelectorAll('script[src*="catalogo.js"]');
    if(!scripts.length) return;
    var src=scripts[0].getAttribute('src')||'';
    var urlV=parseInt((src.match(/\?v=(\d+)/)||[])[1]||0);
    var lojaV=typeof LOJA_DEFAULT!=='undefined'?(LOJA_DEFAULT.cf_versao||0):0;
    // Se versão do URL é diferente de cf_versao publicado → cache desactualizada → recarregar
    if(urlV>0&&lojaV>0&&urlV!==lojaV){
      var bust='?_v='+lojaV;
      if(location.search!==bust) window.location.replace(location.pathname+bust);
    }
  }catch(_){}
})();
</script>

<script>
  // produto.html — Cloudflare Worker directo (sem catalogo.js)
  const _API = 'https://impersilvatech-api.3miliosilva.workers.dev';
  let _p=null,_qty=1,_loja={},_cats=[];

  document.addEventListener('DOMContentLoaded',async()=>{
    apTema();
    const id=parseInt(new URLSearchParams(window.location.search).get('id'));
    if(!id){window.location.href='catalogo.html';return;}
    try{
      // Carregar loja, produto e categorias em paralelo
      const [lR, pR, cR] = await Promise.all([
        fetch(_API+'/api/loja').then(r=>r.json()).catch(()=>({})),
        fetch(_API+'/api/produtos/'+id).then(r=>r.json()),
        fetch(_API+'/api/categorias').then(r=>r.json()).catch(()=>[])
      ]);
      _loja = lR || {};
      _cats = Array.isArray(cR) ? cR : [];
      if(!pR||pR.erro){window.location.href='catalogo.html';return;}
      // Mapear produto
      let feats=[]; try{if(pR.features)feats=JSON.parse(pR.features);}catch(e){}
      let specs=[]; try{if(pR.specs)specs=JSON.parse(pR.specs);}catch(e){}
      let galeria=[]; try{if(pR.imagens_extra)galeria=JSON.parse(pR.imagens_extra);}catch(e){}
      const pct=(pR.preco_original&&pR.preco_original>pR.preco_base)?Math.round((1-pR.preco_base/pR.preco_original)*100):0;
      _p={
        id:pR.id, nome:pR.nome, descricao:pR.descricao||'',
        categoria:pR.categoria_id, preco:pR.preco_base||0,
        preco_orig:pR.preco_original||0, emoji:'🛍️',
        imagem:pR.imagem_url||'', galeria:galeria,
        disponivel:pR.disponivel!==0,
        etiqueta:pct>0?'promo':pR.destaque?'destaque':'',
        destaques:feats, specs:specs,
        stock:pR.stock!==undefined?pR.stock:-1,
        variacoes:(pR.variacoes||[]).map(v=>({id:v.id,nome:v.nome,preco_extra:v.preco_extra||0,disponivel:v.disponivel!==0}))
      };
      // Aplicar cores da loja
      if(_loja.cor_primaria)document.documentElement.style.setProperty('--pink',_loja.cor_primaria);
      if(_loja.cor_secundaria)document.documentElement.style.setProperty('--purple',_loja.cor_secundaria);
      if(_loja.whatsapp){
        const n=_loja.whatsapp.replace(/\D/g,'');
        const fabEl=document.getElementById('fabWa');
        if(fabEl)fabEl.href=`https://wa.me/${n}?text=Olá! Tenho interesse em: ${_p.nome}`;
      }
    }catch(e){
      console.error('Erro ao carregar produto:',e);
      window.location.href='catalogo.html';return;
    }
    carregar();actuBadge();actuWishlist();
  });
  // Utils standalone (sem catalogo.js)
  function getCarrinho(){try{return JSON.parse(localStorage.getItem('cf_carrinho')||'[]');}catch(e){return[];}}
  function salvarCarrinho(c){localStorage.setItem('cf_carrinho',JSON.stringify(c));}
  function getWishlist(){try{return JSON.parse(localStorage.getItem('cf_wl')||'[]');}catch(e){return[];}}
  function isWishlisted(id){return getWishlist().includes(id);}
  function toggleWishlist(id){
    var wl=getWishlist(),idx=wl.indexOf(id);
    if(idx>=0){wl.splice(idx,1);}else{wl.push(id);}
    localStorage.setItem('cf_wl',JSON.stringify(wl));
    return idx<0;
  }
  function kz(v){const sym=(_loja&&_loja.simbolo_moeda)||'Kz';return sym+' '+Number(v||0).toLocaleString('pt');}
  function mudarTema(){const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('tema',t);const el=document.getElementById('tIco');if(el)el.className=t==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';}


  // Helpers de tema (sem catalogo.js)
  function apTema(){const t=localStorage.getItem('tema')||'dark';document.documentElement.setAttribute('data-theme',t);const el=document.getElementById('tIco');if(el)el.className=t==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';}
  function getLoja(){return _loja;}
  function getCategorias(){return _cats;}
  let _carouselIdx=0, _carouselImgs=[];
  function carregar(){
    const p=_p;
    const l=getLoja();
    document.title=p.nome+' | '+l.nome;
    document.getElementById('hdr-titulo').textContent=p.nome;
    document.getElementById('pd-cat').textContent=getCategorias().find(c=>c.id===p.categoria)?.label||'';
    document.getElementById('pd-nome').textContent=p.nome;

    // Construir array de imagens: principal + galeria
    _carouselImgs=[];
    if(p.imagem) _carouselImgs.push(p.imagem);
    if(p.galeria&&p.galeria.length) _carouselImgs.push(...p.galeria.filter(x=>!!x));

    // Construir hero
    const heroContainer=document.getElementById('hero-container');
    const tagHtml=p.etiqueta?`<span class="prod-tag ${p.etiqueta}" id="prod-tag">${{promo:'Promoção',novo:'Novo',destaque:'⭐ Destaque',especial:'Especial'}[p.etiqueta]||''}</span>`:`<span></span>`;

    if(_carouselImgs.length>1){
      // Carrossel
      const slides=_carouselImgs.map((img,i)=>`<div class="carousel-slide"><img src="${img}" alt="${p.nome} ${i+1}" loading="${i===0?'eager':'lazy'}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><span class="carousel-slide-fb" style="display:none;font-size:6rem;width:100%;height:100%;align-items:center;justify-content:center">${p.emoji}</span></div>`).join('');
      const dots=_carouselImgs.map((_,i)=>`<div class="carousel-dot${i===0?' on':''}" onclick="goSlide(${i})"></div>`).join('');
      heroContainer.innerHTML=`
        <div class="carousel" id="carousel">
          <div class="carousel-track" id="carousel-track">${slides}</div>
          <button class="carousel-btn prev" onclick="goSlide(_carouselIdx-1)">‹</button>
          <button class="carousel-btn next" onclick="goSlide(_carouselIdx+1)">›</button>
          <div class="carousel-dots">${dots}</div>
          <div class="tag-strip">${tagHtml}<button class="btn-zoom" onclick="abrirLightbox()"><i class='fa-solid fa-magnifying-glass'></i> Ampliar</button></div>
        </div>`;
    } else if(_carouselImgs.length===1){
      // Imagem simples
      heroContainer.innerHTML=`
        <div class="prod-hero" id="prod-hero">
          <img src="${_carouselImgs[0]}" alt="${p.nome}" onerror="this.style.display='none';document.getElementById('prod-emoji-fb').style.display='block'"/>
          <span class="prod-emoji-big" id="prod-emoji-fb" style="display:none">${p.emoji}</span>
          <div class="tag-strip">${tagHtml}<button class="btn-zoom" onclick="abrirLightbox()"><i class='fa-solid fa-magnifying-glass'></i> Ampliar</button></div>
        </div>`;
    } else {
      // Só emoji
      heroContainer.innerHTML=`
        <div class="prod-hero" id="prod-hero">
          <span class="prod-emoji-big">${p.emoji}</span>
          <div class="tag-strip">${tagHtml}<button class="btn-zoom" onclick="abrirLightbox()"><i class='fa-solid fa-magnifying-glass'></i> Ampliar</button></div>
        </div>`;
    }

    const pEl=document.getElementById('pd-preco');
    if(p.preco>0){pEl.textContent=kz(p.preco);pEl.className='pd-preco';}else{pEl.textContent='Orçamento personalizado';pEl.className='pd-preco orcamento';}
    if(p.preco_orig>0){document.getElementById('pd-orig').textContent=kz(p.preco_orig);document.getElementById('pd-pct').textContent=`-${Math.round((1-p.preco/p.preco_orig)*100)}%`;document.getElementById('pd-orig-row').style.display='flex';}
    document.getElementById('pd-desc').textContent=p.descricao||'';
    document.getElementById('pd-dests').innerHTML=(p.destaques||[]).map(d=>`<span class="pd-dest-it">✓ ${d}</span>`).join('');
    if(p.preco===0){document.getElementById('sec-qty').style.display='none';}
    if(p.specs&&Object.keys(p.specs).length){document.getElementById('sec-specs').style.display='block';document.getElementById('specs-card').innerHTML=Object.entries(p.specs).map(([k,v])=>`<div class="spec-row"><span class="spec-k">${k}</span><span class="spec-v">${v}</span></div>`).join('');}
    const rels=getProdutos().filter(x=>x.categoria===p.categoria&&x.id!==p.id).slice(0,6);
    if(rels.length){document.getElementById('sec-rel').style.display='block';document.getElementById('rel-div').style.display='block';document.getElementById('rel-inner').innerHTML=rels.map(r=>{const imgH=r.imagem?`<img src="${r.imagem}" alt="" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span style="display:none;font-size:2rem;width:100%;height:100%;align-items:center;justify-content:center">${r.emoji}</span>`:r.emoji;return`<div class="rcard" onclick="window.location.href='produto.html?id=${r.id}'"><div class="rcard-img">${imgH}</div><div class="rcard-body"><div class="rcard-nome">${r.nome}</div><div class="rcard-preco">${kz(r.preco)}</div></div></div>`;}).join('');}
    actuBtnAdd();

    // Suporte a swipe no carrossel
    if(_carouselImgs.length>1) _initSwipe();
  }
  function goSlide(idx){
    const total=_carouselImgs.length; if(!total)return;
    _carouselIdx=(idx+total)%total;
    const track=document.getElementById('carousel-track');
    if(track) track.style.transform=`translateX(-${_carouselIdx*100}%)`;
    document.querySelectorAll('.carousel-dot').forEach((d,i)=>d.classList.toggle('on',i===_carouselIdx));
  }
  function _initSwipe(){
    const el=document.getElementById('carousel'); if(!el)return;
    let sx=0,sy=0,moving=false;
    el.addEventListener('touchstart',e=>{
      sx=e.touches[0].clientX;
      sy=e.touches[0].clientY;
      moving=false;
    },{passive:true});
    el.addEventListener('touchmove',e=>{
      const dx=Math.abs(e.touches[0].clientX-sx);
      const dy=Math.abs(e.touches[0].clientY-sy);
      // Só bloquear scroll se movimento é maioritariamente horizontal
      if(dx>dy&&dx>8){moving=true;e.preventDefault();}
    },{passive:false});
    el.addEventListener('touchend',e=>{
      if(!moving)return;
      const dx=e.changedTouches[0].clientX-sx;
      if(Math.abs(dx)>40) goSlide(_carouselIdx+(dx<0?1:-1));
      moving=false;
    },{passive:true});
  }
  function qty(d){_qty=Math.max(1,Math.min(99,_qty+d));document.getElementById('qty-val').textContent=_qty;actuBtnAdd();}
  function actuBtnAdd(){if(_p.preco>0)document.getElementById('btn-add').textContent=`Adicionar — ${kz(_p.preco*_qty)}`;}
  function addCart(){
    if(!_p)return;
    const nota=document.getElementById('nota-input').value.trim();
    if(_p.preco===0){
      const l=getLoja();let m=`💌 *PEDIDO DE ORÇAMENTO — ${l.nome}*\n\n*Produto:* ${_p.nome}`;
      if(nota)m+=`\n*Detalhes:* ${nota}`;
      window.open(`https://wa.me/${l.whatsapp.replace(/\D/g,'')}?text=${encodeURIComponent(m)}`,'_blank');return;
    }
    const c=getCarrinho();c.push({chave:`${_p.id}-${Date.now()}`,produto_id:_p.id,nome:_p.nome,preco:_p.preco,quantidade:_qty,imagem:_p.imagem||'',emoji:_p.emoji,nota});
    salvarCarrinho(c);actuBadge();toast(`✓ ${_p.nome} adicionado!`,'ok');
    // Transformar botão em CTA para o carrinho durante 4s
    const btnAdd=document.getElementById('btn-add');
    const txtOriginal=btnAdd.textContent;
    btnAdd.textContent='🛒 Ver Carrinho →';
    btnAdd.style.background='linear-gradient(135deg,#06d6a0,#04b385)';
    btnAdd.onclick=()=>window.location.href='carrinho.html';
    clearTimeout(window._btnAddTimer);
    window._btnAddTimer=setTimeout(()=>{
      btnAdd.textContent=txtOriginal;
      btnAdd.style.background='';
      btnAdd.onclick=addCart;
    },4000);
  }
  function abrirLightbox(){
    const lb=document.getElementById('lightbox'),lI=document.getElementById('lb-img'),lE=document.getElementById('lb-emoji');
    const imgActual=_carouselImgs[_carouselIdx]||_p.imagem;
    if(imgActual){lI.src=imgActual;lI.style.display='block';lE.style.display='none';}
    else{lE.textContent=_p.emoji;lE.style.display='block';lI.style.display='none';}
    lb.classList.add('on');document.body.style.overflow='hidden';
  }
  function fecharLightbox(){document.getElementById('lightbox').classList.remove('on');document.body.style.overflow='';}
  function actuBadge(){
    const c=JSON.parse(localStorage.getItem('cf_carrinho')||'[]');
    const q=c.reduce((s,i)=>s+i.quantidade,0);
    const b=document.getElementById('badge-n');
    if(b){b.textContent=q;b.style.display=q>0?'flex':'none';}
    const sym=(_loja&&_loja.simbolo_moeda)||'Kz';
    const btnAdd=document.getElementById('btn-add');
    if(btnAdd&&_p){
      if(!_p.disponivel){btnAdd.disabled=true;btnAdd.innerHTML='Produto Esgotado 🙈';}
      else{
        btnAdd.disabled=false;
        const vSel=document.querySelector('.variacao-btn.on');
        const extra=vSel?parseFloat(vSel.dataset.extra)||0:0;
        const val=(_p.preco+extra)*_qty;
        btnAdd.innerHTML=`<i class="fa-solid fa-cart-shopping" style="margin-right:6px"></i>Adicionar — ${sym} ${val.toLocaleString('pt')}`;
      }
    }
  }
  function actuWishlist(){
    if(!_p) return;
    const btn=document.getElementById('btn-wl');
    if(btn) btn.innerHTML=isWishlisted(_p.id)?'<i class="fa-solid fa-heart"></i>':'<i class="fa-regular fa-heart"></i>';
  }
  function toggleWl(){
    if(!_p) return;
    const adicionado=toggleWishlist(_p.id);
    actuWishlist();
    toast(adicionado?'❤️ Adicionado à wishlist':'🤍 Removido da wishlist','ok');
  }
  function toast(msg,tipo){clearTimeout(window._toastTimer);const t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.className='toast show '+(tipo||'ok');window._toastTimer=window.setTimeout(function(){const e=document.getElementById('toast');if(e)e.classList.remove('show');},3200);}
</script>
</body>
</html>
