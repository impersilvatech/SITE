<!DOCTYPE html>
<html lang="pt-AO" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#0d0d1a"/>
<title>Catálogo</title>
<script>
// Tema antes de render (sem flash)
(function(){
  try{
    var t=localStorage.getItem('tema')||'dark';
    document.documentElement.setAttribute('data-theme',t);
  }catch(e){}
  // Registar SW
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(function(){});
  }
})();
</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet"/>
<style>
/* ── VARIÁVEIS ── */
:root{
  --bg:#0d0d1a;--bg2:#14142b;--card:#1a1a32;--border:#2a2a4a;
  --pink:#ff6b9d;--purple:#b14ae8;--teal:#06d6a0;--yellow:#ffd166;
  --red:#ff4757;--white:#f0f0ff;--muted:#9898bb;--muted2:#4a4a6a;
  --ft:'Fredoka One',cursive;--fb:'Nunito',sans-serif;
  --grad:linear-gradient(135deg,#ff6b9d,#b14ae8);
  --r:12px;--r2:18px;--tr:all .22s cubic-bezier(.4,0,.2,1);
}
[data-theme="light"]{
  --bg:#fff5f8;--bg2:#fff;--card:#fff;--border:#f0d6e8;
  --white:#1a0a2e;--muted:#7a5a8a;--muted2:#b0a0b8;
  --pink:#c8336e;--purple:#7a2fb0;--teal:#048a65;--red:#c8002d;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--bg);color:var(--white);
  min-height:100vh;overflow-x:hidden;padding-bottom:68px;
  transition:background .3s,color .3s}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:100;background:rgba(13,13,26,.97);
  backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
[data-theme="light"] .hdr{background:rgba(255,245,248,.97)}
.hdr-top{display:flex;align-items:center;padding:10px 13px;gap:10px}
.hdr-logo{font-family:var(--ft);font-size:1.1rem;
  background:var(--grad);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;
  flex:1;letter-spacing:.3px}
.hbtn{width:36px;height:36px;border-radius:50%;background:none;
  border:1px solid var(--border);display:flex;align-items:center;
  justify-content:center;font-size:.88rem;cursor:pointer;
  color:var(--white);transition:var(--tr);flex-shrink:0}
.hbtn:hover{border-color:var(--pink);color:var(--pink)}

/* Search */
.srch{padding:0 12px 8px;background:var(--bg2);border-bottom:1px solid var(--border)}
.srch-inner{position:relative}
.srch-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);
  font-size:.8rem;color:var(--muted);pointer-events:none}
.srch-inp{width:100%;padding:9px 34px 9px 34px;background:var(--card);
  border:1.5px solid var(--border);border-radius:50px;
  font-family:var(--fb);font-size:.86rem;color:var(--white);
  outline:none;transition:border-color .2s}
.srch-inp:focus{border-color:var(--pink)}
.srch-inp::placeholder{color:var(--muted2)}
[data-theme="light"] .srch-inp{background:#f0e4f0}
.srch-x{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  width:22px;height:22px;border-radius:50%;background:var(--border);
  border:none;font-size:.65rem;cursor:pointer;color:var(--muted);
  display:none;align-items:center;justify-content:center}
.srch-x.on{display:flex}

/* Cats pills */
.cats{overflow-x:auto;scrollbar-width:none;padding:8px 12px 6px;
  border-bottom:1px solid var(--border)}
.cats::-webkit-scrollbar{display:none}
.cats-row{display:flex;gap:6px;width:max-content}
.cpill{padding:5px 14px;border:1.5px solid var(--border);border-radius:50px;
  background:none;font-family:var(--ft);font-size:.68rem;color:var(--muted);
  cursor:pointer;white-space:nowrap;transition:var(--tr);
  display:flex;align-items:center;gap:5px}
.cpill:hover{border-color:var(--pink);color:var(--pink)}
.cpill.on{background:var(--grad);color:#fff;border-color:transparent;
  box-shadow:0 2px 10px rgba(255,107,157,.3)}

/* Toolbar */
.tbar{display:flex;align-items:center;justify-content:space-between;
  padding:8px 13px 6px}
.tbar-info{font-size:.72rem;color:var(--muted)}
.tbar-info strong{color:var(--white)}
.tbar-acts{display:flex;gap:6px;align-items:center}
.wl-btn{display:flex;align-items:center;gap:4px;padding:5px 11px;
  background:none;border:1px solid var(--border);border-radius:50px;
  font-family:var(--ft);font-size:.62rem;color:var(--muted);
  cursor:pointer;transition:var(--tr)}
.wl-btn.on{color:var(--pink);border-color:rgba(255,107,157,.4);
  background:rgba(255,107,157,.07)}
.vtw{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.vt{width:28px;height:26px;background:none;border:none;font-size:.74rem;
  color:var(--muted);cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:var(--tr)}
.vt.on{background:var(--pink);color:#fff}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:4px 12px 0}
.grid.list{display:flex;flex-direction:column;gap:8px}
@media(min-width:520px){.grid:not(.list){grid-template-columns:repeat(3,1fr)}}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--border);
  border-radius:var(--r2);overflow:hidden;position:relative;
  cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;
  user-select:none;-webkit-tap-highlight-color:transparent}
.card:active{transform:scale(.97)}
.card:hover{transform:translateY(-2px);
  box-shadow:0 6px 24px rgba(255,107,157,.15);
  border-color:rgba(255,107,157,.3)}
.card.out{opacity:.5;cursor:not-allowed;filter:grayscale(.4)}
.grid.list .card{display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:14px}

/* Card image */
.cimg{aspect-ratio:1;background:var(--bg2);overflow:hidden;
  display:flex;align-items:center;justify-content:center;font-size:3rem;
  position:relative}
.grid.list .cimg{width:62px;height:62px;aspect-ratio:auto;flex-shrink:0;border-radius:10px}
.cimg img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.card:hover .cimg img{transform:scale(1.06)}

/* Tag overlay */
.ctags{position:absolute;top:0;left:0;right:0;
  display:flex;justify-content:space-between;padding:7px;
  pointer-events:none;z-index:2}
.grid.list .ctags{display:none}
.tag{padding:2px 8px;border-radius:6px;font-family:var(--ft);
  font-size:.52rem;font-weight:700;text-transform:uppercase}
.tag-novo{background:var(--teal);color:#fff}
.tag-promo{background:var(--red);color:#fff}
.tag-dest{background:var(--grad);color:#fff}
.tag-x{visibility:hidden}

/* Wishlist btn */
.wbtn{width:28px;height:28px;border-radius:8px;
  background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:.72rem;cursor:pointer;pointer-events:all;transition:var(--tr)}
.wbtn.on,.wbtn:active{background:rgba(255,107,157,.25);
  border-color:rgba(255,107,157,.5);color:var(--pink)}
.grid.list .wbtn{position:relative;flex-shrink:0;width:32px;height:32px;border-radius:10px;background:var(--bg2);border-color:var(--border)}

/* Esgotado */
.esgo{position:absolute;bottom:0;left:0;right:0;
  background:rgba(255,71,87,.12);border-top:1px solid rgba(255,71,87,.2);
  text-align:center;font-family:var(--ft);font-size:.5rem;
  text-transform:uppercase;color:var(--red);padding:3px}
.grid.list .esgo{display:none}

/* Card body */
.cbody{padding:9px 11px 12px}
.grid.list .cbody{padding:0;flex:1;min-width:0}
.ccat{font-size:.54rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.4px;color:var(--pink);margin-bottom:2px}
.cnom{font-family:var(--ft);font-size:.9rem;line-height:1.25;
  margin-bottom:4px;overflow:hidden;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.grid.list .cnom{-webkit-line-clamp:1;display:block;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cpreco{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.preco{font-family:var(--ft);font-size:.9rem;color:var(--pink)}
.preco-orig{font-size:.7rem;text-decoration:line-through;color:var(--muted2)}

/* Add button */
.badd{position:absolute;bottom:8px;right:8px;width:30px;height:30px;
  border-radius:50%;background:var(--grad);border:none;color:#fff;
  font-size:1.15rem;cursor:pointer;display:flex;align-items:center;
  justify-content:center;box-shadow:0 3px 10px rgba(255,107,157,.4);
  transition:var(--tr);z-index:3;pointer-events:all}
.badd:active{transform:scale(.88)}
.grid.list .badd{position:relative;bottom:auto;right:auto;
  flex-shrink:0;width:36px;height:36px;border-radius:10px}

/* ── EMPTY / LOADING ── */
.empty{text-align:center;padding:60px 20px}
.empty i{font-size:3.5rem;opacity:.14;display:block;
  margin-bottom:14px;color:var(--pink)}
.empty p{font-family:var(--ft);font-size:.92rem;color:var(--muted);
  margin-bottom:16px}
.empty button{padding:10px 24px;background:var(--grad);border:none;
  border-radius:50px;font-family:var(--ft);font-size:.78rem;
  color:#fff;cursor:pointer;box-shadow:0 3px 10px rgba(255,107,157,.3)}
.spin-wrap{display:flex;justify-content:center;padding:60px}
.spin{width:30px;height:30px;border-radius:50%;
  border:2.5px solid var(--border);border-top-color:var(--pink);
  animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── SHEET ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);
  backdrop-filter:blur(4px);z-index:300;
  opacity:0;pointer-events:none;transition:opacity .25s}
.ov.on{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:301;
  background:var(--card);border-radius:22px 22px 0 0;
  border-top:1px solid rgba(255,107,157,.25);
  max-height:92vh;overflow-y:auto;scrollbar-width:none;
  transform:translateY(100%);transition:transform .32s cubic-bezier(.34,1.1,.64,1)}
.sheet::-webkit-scrollbar{display:none}
.sheet.on{transform:translateY(0)}
[data-theme="light"] .sheet{background:#fff}
.sh-pull{width:36px;height:3px;background:var(--border);
  border-radius:2px;margin:10px auto 0}
.sh-hd{display:flex;align-items:center;justify-content:space-between;
  padding:11px 16px 0}
.sh-hd-t{font-family:var(--ft);font-size:.8rem;color:var(--muted)}
.sh-cls{background:none;border:1px solid var(--border);border-radius:8px;
  padding:4px 11px;font-family:var(--ft);font-size:.65rem;color:var(--muted);
  cursor:pointer;transition:var(--tr)}
.sh-cls:hover{border-color:var(--red);color:var(--red)}
.sh-body{padding:12px 16px 16px}
.sh-prod{display:flex;gap:13px;padding-bottom:13px;border-bottom:1px solid var(--border)}
.sh-img{width:86px;height:86px;flex-shrink:0;border-radius:14px;
  background:var(--bg2);display:flex;align-items:center;
  justify-content:center;font-size:2.6rem;overflow:hidden}
.sh-img img{width:100%;height:100%;object-fit:cover}
.sh-info{flex:1;min-width:0}
.sh-cat{font-size:.54rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.4px;color:var(--pink);margin-bottom:3px}
.sh-nom{font-family:var(--ft);font-size:1.05rem;line-height:1.2;margin-bottom:5px}
.sh-prices{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.sh-price{font-family:var(--ft);font-size:1.1rem;color:var(--pink)}
.sh-orig{font-size:.78rem;text-decoration:line-through;color:var(--muted2)}
.sh-pct{padding:2px 7px;background:var(--red);color:#fff;
  border-radius:6px;font-size:.56rem;font-weight:700}
.sh-desc{font-size:.8rem;color:var(--muted);line-height:1.55;
  font-style:italic;margin-top:5px}
.feats{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.feat{padding:3px 9px;background:rgba(6,214,160,.07);
  border:1px solid rgba(6,214,160,.2);border-radius:50px;
  font-size:.65rem;color:var(--teal);display:flex;align-items:center;gap:3px}
.sh-sec{font-size:.58rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;color:var(--muted2);margin:12px 0 7px}
.vars{display:flex;flex-wrap:wrap;gap:6px}
.vbtn{padding:7px 14px;background:var(--bg2);border:1.5px solid var(--border);
  border-radius:50px;font-family:var(--ft);font-size:.67rem;color:var(--muted);
  cursor:pointer;transition:var(--tr)}
.vbtn.on{border-color:var(--pink);color:var(--pink);background:rgba(255,107,157,.08)}
.qty-row{display:flex;align-items:center;gap:5px}
.qb{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border);
  background:none;font-size:1.2rem;font-weight:700;color:var(--white);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:var(--tr)}
.qb:active{background:var(--pink);border-color:var(--pink)}
.qv{min-width:44px;text-align:center;font-family:var(--ft);font-size:1.1rem}
.nota{width:100%;min-height:62px;padding:9px 12px;background:var(--bg2);
  border:1.5px solid var(--border);border-radius:12px;
  font-family:var(--fb);font-size:.82rem;color:var(--white);
  resize:none;outline:none;line-height:1.5;transition:border-color .2s;margin-top:5px}
.nota:focus{border-color:rgba(255,107,157,.4)}
.nota::placeholder{color:var(--muted2)}
.sh-foot{display:flex;gap:8px;margin-top:12px}
.btn-det{flex:0 0 auto;padding:12px 14px;background:none;
  border:1.5px solid var(--border);border-radius:50px;
  font-family:var(--ft);font-size:.7rem;color:var(--muted);
  cursor:pointer;white-space:nowrap;transition:var(--tr)}
.btn-det:hover{border-color:var(--pink);color:var(--pink)}
.btn-addc{flex:1;padding:13px;background:var(--grad);border:none;
  border-radius:50px;font-family:var(--ft);font-size:.82rem;
  color:#fff;cursor:pointer;box-shadow:0 4px 14px rgba(255,107,157,.3);
  transition:var(--tr);display:flex;align-items:center;justify-content:center;gap:6px}
.btn-addc:active{opacity:.9;transform:scale(.98)}

/* ── DRAWER ── */
.dov{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.55);
  backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .25s}
.dov.on{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;right:0;bottom:0;
  width:min(260px,75vw);z-index:401;
  background:var(--card);border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.drawer.on{transform:translateX(0)}
[data-theme="light"] .drawer{background:var(--bg2)}
.drw-hd{padding:16px 14px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between}
.drw-logo{font-family:var(--ft);font-size:1rem;
  background:var(--grad);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text}
.drw-x{width:28px;height:28px;border-radius:50%;background:none;
  border:1px solid var(--border);display:flex;align-items:center;
  justify-content:center;font-size:.75rem;cursor:pointer;color:var(--muted);
  transition:var(--tr)}
.drw-x:hover{border-color:var(--red);color:var(--red)}
.drw-body{flex:1;overflow-y:auto;padding:8px}
.drw-auth{margin:8px 0;padding:12px;background:rgba(255,107,157,.06);
  border:1px solid rgba(255,107,157,.18);border-radius:var(--r)}
.drw-auth p{font-size:.76rem;color:var(--muted);margin-bottom:8px;line-height:1.5}
.drw-auth a{display:flex;align-items:center;justify-content:center;gap:6px;
  padding:9px;background:var(--grad);border:none;border-radius:50px;
  font-family:var(--ft);font-size:.76rem;color:#fff;text-decoration:none}
.drw-cli{padding:11px;background:rgba(6,214,160,.07);
  border:1px solid rgba(6,214,160,.18);border-radius:var(--r);margin:8px 0}
.drw-cli-n{font-family:var(--ft);font-size:.88rem;margin-bottom:2px}
.drw-cli-e{font-size:.7rem;color:var(--muted)}
.drw-sep{height:1px;background:var(--border);margin:6px 0}
.drw-item{display:flex;align-items:center;gap:10px;padding:11px 10px;
  border-radius:var(--r);cursor:pointer;transition:var(--tr);
  text-decoration:none;color:var(--white);background:none;border:none;
  font-family:var(--fb);font-size:.86rem;width:100%;text-align:left}
.drw-item:hover{background:rgba(255,107,157,.07)}
.drw-item i{width:20px;text-align:center;color:var(--pink);font-size:.9rem;flex-shrink:0}
.drw-item .di-s{font-size:.68rem;color:var(--muted);display:block;margin-top:1px}

/* ── NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:200;
  padding:6px 10px max(env(safe-area-inset-bottom,0px),8px);
  display:flex;gap:8px;align-items:center;
  background:rgba(13,13,26,.97);backdrop-filter:blur(20px);
  border-top:1px solid var(--border)}
[data-theme="light"] .bnav{background:rgba(255,245,248,.97)}
.nhome{width:38px;height:38px;border-radius:50%;
  background:var(--card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;color:var(--white);text-decoration:none;
  flex-shrink:0;transition:var(--tr)}
.nhome:hover{border-color:var(--pink);color:var(--pink)}
.ncart{flex:1;height:38px;background:var(--grad);border:none;
  border-radius:50px;font-family:var(--ft);font-size:.8rem;
  color:#fff;cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:8px;
  box-shadow:0 3px 12px rgba(255,107,157,.28);
  text-decoration:none;transition:var(--tr)}
.ncart:hover{filter:brightness(1.08)}
.ncart-n{background:rgba(255,255,255,.22);border-radius:50px;
  padding:1px 8px;font-size:.66rem}

/* ── TOAST ── */
.toast{position:fixed;top:64px;left:50%;
  transform:translateX(-50%) translateY(-80px);
  background:var(--card);border:1px solid rgba(255,107,157,.4);
  border-radius:14px;padding:9px 16px;font-size:.8rem;font-weight:700;
  color:var(--pink);max-width:calc(100vw - 28px);z-index:9999;
  opacity:0;pointer-events:none;
  transition:transform .38s cubic-bezier(.34,1.56,.64,1);
  display:flex;align-items:center;gap:6px;
  box-shadow:0 6px 24px rgba(0,0,0,.35)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.err{border-color:rgba(255,71,87,.4);color:var(--red)}
.toast.wl{border-color:rgba(255,209,102,.4);color:var(--yellow)}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-top">
    <div class="hdr-logo" id="hdrLogo">Catálogo</div>
    <button class="hbtn" onclick="temaToggle()"><i id="tIco" class="fa-solid fa-moon"></i></button>
    <button class="hbtn" onclick="drawerAbrir()"><i class="fa-solid fa-bars"></i></button>
  </div>
  <div class="srch">
    <div class="srch-inner">
      <span class="srch-ico"><i class="fa-solid fa-magnifying-glass"></i></span>
      <input class="srch-inp" type="search" id="sInp" placeholder="Pesquisar produto..."
        oninput="onSrch(this.value)" autocomplete="off"/>
      <button class="srch-x" id="sX" onclick="limSrch()"><i class="fa-solid fa-xmark"></i></button>
    </div>
  </div>
  <div class="cats"><div class="cats-row" id="catsRow"></div></div>
</header>

<!-- TOOLBAR -->
<div class="tbar">
  <span class="tbar-info" id="info">A carregar...</span>
  <div class="tbar-acts">
    <button class="wl-btn" id="wlBtn" onclick="toggleWlMode()">
      <i class="fa-solid fa-heart"></i> Wishlist
      <span id="wlN" style="display:none;background:var(--pink);color:#fff;border-radius:50px;padding:0 6px;font-size:.54rem">0</span>
    </button>
    <div class="vtw">
      <button class="vt on" id="vtG" onclick="setView('grid')"><i class="fa-solid fa-grip"></i></button>
      <button class="vt" id="vtL" onclick="setView('list')"><i class="fa-solid fa-list"></i></button>
    </div>
  </div>
</div>

<!-- GRID -->
<div class="grid" id="grid"><div class="spin-wrap"><div class="spin"></div></div></div>
<div class="empty" id="emptyEl" style="display:none">
  <i class="fa-solid fa-box-open"></i>
  <p id="emptyMsg">Sem produtos disponíveis.</p>

      <i class="fa-solid fa-clock-rotate-left"></i>
      <div><span>Acompanhar Pedido</span><span class="di-s">Ver estado da encomenda</span></div>
    </a>
    <a href="conta.html" class="drw-item" onclick="drawerFechar()">
      <i class="fa-solid fa-user"></i>
      <div><span>A Minha Conta</span><span class="di-s">Login, registo e encomendas</span></div>

      <i class="fa-brands fa-whatsapp" style="color:#25D366"></i>
      <div><span>WhatsApp</span><span class="di-s">Falar com a loja</span></div>
    </button>
    <button class="drw-item" onclick="temaToggle();drawerFechar()">
      <i class="fa-solid fa-circle-half-stroke"></i>

<nav class="bnav">
  <a href="index.html" class="nhome"><i class="fa-solid fa-house"></i></a>

    <i class="fa-solid fa-cart-shopping"></i>
    <span>Ver Carrinho</span>
    <span class="ncart-n" id="nCartN" style="display:none">0</span>
  </a>
</nav>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// CATÁLOGO — Direct Worker fetch
// ═══════════════════════════════════════════════════════
const API = 'https://impersilvatech-api.3miliosilva.workers.dev';

// State
let loja = {}, cats = [], prods = [];
let catAtiva = '', srchQ = '', wlMode = false, viewMode = 'grid';
let shProd = null, shVar = null, shQty = 1;

// ── INIT ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async function() {
  apTema();
  atualizarNavCart();

  // Categoria inicial (vinda do index.html)
  const iniCat = sessionStorage.getItem('cf_cat_ini');
  if (iniCat) { catAtiva = iniCat; sessionStorage.removeItem('cf_cat_ini'); }
  const urlCat = new URLSearchParams(location.search).get('cat');
  if (urlCat) catAtiva = urlCat;

  // Carregar dados
  await carregarDados();
});

async function carregarDados() {
  document.getElementById('grid').innerHTML = '<div class="spin-wrap"><div class="spin"></div></div>';
  document.getElementById('emptyEl').style.display = 'none';
  document.getElementById('info').textContent = 'A carregar...';

  try {
    const rL = await fetch(API + '/api/loja');
    loja = await rL.json();
    if (loja.erro) loja = {};
  } catch(e) { loja = {}; }

  try {
    const rC = await fetch(API + '/api/categorias');
    const cData = await rC.json();
    cats = Array.isArray(cData) ? cData : [];
  } catch(e) { cats = []; }

  try {
    const rP = await fetch(API + '/api/produtos');
    const pData = await rP.json();
    prods = Array.isArray(pData) ? pData : [];
  } catch(e) { prods = []; }

  // Aplicar loja
  if (loja.nome) {
    document.getElementById('hdrLogo').textContent = loja.nome;
    document.title = 'Catálogo — ' + loja.nome;
  }
  if (loja.cor_primaria) document.documentElement.style.setProperty('--pink', loja.cor_primaria);
  if (loja.cor_secundaria) document.documentElement.style.setProperty('--purple', loja.cor_secundaria);

  // Verificar loja activa
  if (loja.ativa === 0) {
    const msg = loja.mensagem_fecho || 'Estamos temporariamente fechados.';
    document.getElementById('grid').innerHTML = '';
    document.getElementById('emptyEl').style.display = 'block';
    document.getElementById('emptyMsg').textContent = '🔒 ' + msg;
    document.getElementById('info').textContent = 'Loja fechada';
    return;
  }

  buildCats();
  renderGrid();
}

// ── CATEGORIAS ───────────────────────────────────────
function buildCats() {
  const row = document.getElementById('catsRow');
  row.innerHTML = '';

  const btnAll = mkPill('🏪', 'Tudo', '');
  if (!catAtiva) btnAll.classList.add('on');
  row.appendChild(btnAll);

  cats.forEach(function(c) {
    const btn = mkPill(c.icone || '🏷️', c.nome, c.slug);
    if (catAtiva === c.slug) btn.classList.add('on');
    row.appendChild(btn);
  });
}

function mkPill(ico, nome, slug) {
  const b = document.createElement('button');
  b.className = 'cpill';
  b.dataset.slug = slug;
  b.innerHTML = '<span>' + ico + '</span>' + nome;
  b.addEventListener('click', function() { filtrarCat(slug, b); });
  return b;
}

// ── FILTROS ──────────────────────────────────────────
function filtrarCat(slug, btn) {
  catAtiva = slug;
  wlMode = false;
  document.getElementById('wlBtn').classList.remove('on');
  document.querySelectorAll('.cpill').forEach(function(b) { b.classList.remove('on'); });
  if (btn) btn.classList.add('on');
  else {
    const pill = document.querySelector('.cpill[data-slug="' + slug + '"]');
    if (pill) pill.classList.add('on');
  }
  renderGrid();
}

function onSrch(v) {
  srchQ = v.trim().toLowerCase();
  document.getElementById('sX').classList.toggle('on', !!srchQ);
  wlMode = false;
  renderGrid();
}

function limSrch() {
  document.getElementById('sInp').value = '';
  onSrch('');
}

function limFiltros() {
  catAtiva = ''; srchQ = ''; wlMode = false;
  document.getElementById('sInp').value = '';
  document.getElementById('sX').classList.remove('on');
  document.getElementById('wlBtn').classList.remove('on');
  document.querySelectorAll('.cpill').forEach(function(b) { b.classList.remove('on'); });
  const allPill = document.querySelector('.cpill[data-slug=""]');
  if (allPill) allPill.classList.add('on');
  renderGrid();
}

function setView(v) {
  viewMode = v;
  document.getElementById('grid').className = 'grid' + (v === 'list' ? ' list' : '');
  document.getElementById('vtG').classList.toggle('on', v === 'grid');
  document.getElementById('vtL').classList.toggle('on', v === 'list');
}

function toggleWlMode() {
  wlMode = !wlMode;
  document.getElementById('wlBtn').classList.toggle('on', wlMode);
  renderGrid();
}

// ── RENDER ───────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('grid');
  const emptyEl = document.getElementById('emptyEl');
  const wl = getWl();

  let lista = prods.slice();

  if (wlMode) {
    lista = lista.filter(function(p) { return wl.includes(String(p.id)); });
  } else {
    if (catAtiva) {
      const catObj = cats.find(function(c) { return c.slug === catAtiva; });
      if (catObj) lista = lista.filter(function(p) { return p.categoria_id === catObj.id; });
    }
    if (srchQ) {
      lista = lista.filter(function(p) {
        return p.nome.toLowerCase().includes(srchQ) ||
          (p.descricao || '').toLowerCase().includes(srchQ);
      });
    }
  }

  // Info
  const infoEl = document.getElementById('info');
  if (wlMode) {
    infoEl.innerHTML = '<strong>Wishlist</strong>';
  } else {
    infoEl.innerHTML = '<strong>' + lista.length + '</strong> produto' + (lista.length !== 1 ? 's' : '');
  }

  // Wishlist badge
  const wlN = document.getElementById('wlN');
  wlN.textContent = wl.length;
  wlN.style.display = wl.length > 0 ? 'inline' : 'none';

  // Empty
  if (lista.length === 0) {
    grid.innerHTML = '';
    emptyEl.style.display = 'block';
    if (wlMode) {
      document.getElementById('emptyMsg').textContent = 'A tua wishlist está vazia.';
    } else if (srchQ) {
      document.getElementById('emptyMsg').textContent = 'Sem resultados para "' + srchQ + '".';
    } else if (catAtiva) {
      document.getElementById('emptyMsg').textContent = 'Sem produtos nesta categoria.';
    } else if (prods.length === 0) {
      document.getElementById('emptyMsg').textContent = 'Sem produtos disponíveis de momento.';
    } else {
      document.getElementById('emptyMsg').textContent = 'Sem produtos nesta categoria.';
    }
    return;
  }

  emptyEl.style.display = 'none';
  const sym = loja.simbolo_moeda || 'Kz';
  const now = Date.now();

  grid.innerHTML = lista.map(function(p) {
    const cat = cats.find(function(c) { return c.id === p.categoria_id; });
    const wished = wl.includes(String(p.id));
    const pct = (p.preco_original && p.preco_original > p.preco_base)
      ? Math.round((1 - p.preco_base / p.preco_original) * 100) : 0;
    const isNew = p.criado_em && (now - new Date(p.criado_em).getTime()) < 7 * 24 * 60 * 60 * 1000;
    const out = p.disponivel === 0;
    const sym2 = sym;
    const preco = Number(p.preco_base).toLocaleString('pt');
    const precoOrig = p.preco_original ? Number(p.preco_original).toLocaleString('pt') : '';
    const catNome = cat ? cat.nome : '';
    const imgH = (p.imagem_url && !p.imagem_url.startsWith('data:'))
      ? '<img src="' + p.imagem_url + '" alt="" loading="lazy" onerror="this.parentElement.textContent=\'🛍️\'">'
      : '🛍️';
    const tagClass = pct > 0 ? 'tag-promo' : p.destaque ? 'tag-dest' : isNew ? 'tag-novo' : 'tag-x';
    const tagTxt = pct > 0 ? '-' + pct + '%' : p.destaque ? '⭐ Dest.' : isNew ? 'Novo' : '&nbsp;';

    return '<div class="card' + (out ? ' out' : '') + '" ' +
      'data-id="' + p.id + '" onclick="onCardClick(this)">' +
      '<div class="cimg">' + imgH +
        '<div class="ctags">' +
          '<span class="tag ' + tagClass + '">' + tagTxt + '</span>' +
          '<button class="wbtn' + (wished ? ' on' : '') + '" ' +
            'data-id="' + p.id + '" onclick="event.stopPropagation();wlToggle(this)">' +
            (wished ? '<i class="fa-solid fa-heart"></i>' : '<i class="fa-regular fa-heart"></i>') +
          '</button>' +
        '</div>' +
        (out ? '<div class="esgo">Esgotado</div>' : '') +
      '</div>' +
      '<div class="cbody">' +
        '<div class="ccat">' + catNome + '</div>' +
        '<div class="cnom">' + p.nome + '</div>' +
        '<div class="cpreco">' +
          '<span class="preco">' + sym2 + ' ' + preco + '</span>' +
          (pct > 0 ? '<span class="preco-orig">' + sym2 + ' ' + precoOrig + '</span>' : '') +
        '</div>' +
      '</div>' +
      ((!out && p.preco_base > 0) ? '<button class="badd" data-id="' + p.id + '" onclick="event.stopPropagation();addDireto(this.dataset.id)" title="Adicionar">+</button>' : '') +
      '</div>';
  }).join('');
}

// ── CARD CLICK ───────────────────────────────────────
function onCardClick(el) {
  if (el.classList.contains('out')) { toast('Produto esgotado de momento', 'err'); return; }
  const id = parseInt(el.dataset.id);
  shAbrir(id);
}

// ── BOTTOM SHEET ─────────────────────────────────────
async function shAbrir(id) {
  const p = prods.find(function(x) { return x.id === id; });
  if (!p) return;
  shProd = p; shVar = null; shQty = 1;

  const sym = loja.simbolo_moeda || 'Kz';
  const pct = (p.preco_original && p.preco_original > p.preco_base)
    ? Math.round((1 - p.preco_base / p.preco_original) * 100) : 0;
  const cat = cats.find(function(c) { return c.id === p.categoria_id; });

  // Imagem
  const shImg = document.getElementById('shImg');
  if (p.imagem_url && !p.imagem_url.startsWith('data:')) {
    shImg.innerHTML = '<img src="' + p.imagem_url + '" alt="" style="width:100%;height:100%;object-fit:cover">';
  } else {
    shImg.textContent = '🛍️';
  }

  document.getElementById('shCat').textContent = cat ? cat.nome : '';
  document.getElementById('shNom').textContent = p.nome;
  document.getElementById('shPrc').textContent = sym + ' ' + Number(p.preco_base).toLocaleString('pt');
  document.getElementById('shDesc').textContent = p.descricao || '';

  const origEl = document.getElementById('shOrig');
  const pctEl = document.getElementById('shPct');
  if (pct > 0) {
    origEl.textContent = sym + ' ' + Number(p.preco_original).toLocaleString('pt');
    origEl.style.display = 'inline';
    pctEl.textContent = '-' + pct + '%';
    pctEl.style.display = 'inline';
  } else {
    origEl.style.display = 'none';
    pctEl.style.display = 'none';
  }

  // Features
  let feats = [];
  try { if (p.features) feats = JSON.parse(p.features); } catch(e) {}
  const featsEl = document.getElementById('shFeats');
  if (feats.length) {
    featsEl.innerHTML = feats.map(function(f) {
      return '<span class="feat"><i class="fa-solid fa-check"></i>' + f + '</span>';
    }).join('');
    featsEl.style.display = 'flex';
  } else {
    featsEl.style.display = 'none';
  }

  document.getElementById('qVal').textContent = '1';
  document.getElementById('notaTa').value = '';

  // Botão detalhes
  const btnDet = document.getElementById('shBtnDet');
  btnDet.onclick = function() { shFechar(); location.href = 'produto.html?id=' + id; };

  // Atualizar botão add
  atualizarBtnAdd();

  // Variações (fetch do produto com vars)
  const varsWrap = document.getElementById('shVarsWrap');
  const varsList = document.getElementById('shVars');
  varsWrap.style.display = 'none';
  varsList.innerHTML = '';

  try {
    const r = await fetch(API + '/api/produtos/' + id);
    const d = await r.json();
    const vars = d.variacoes || [];
    if (vars.length) {
      varsWrap.style.display = '';
      varsList.innerHTML = vars.map(function(v) {
        const extra = v.preco_extra > 0 ? ' +' + sym + ' ' + Number(v.preco_extra).toLocaleString('pt') : '';
        return '<button class="vbtn" data-vid="' + v.id + '" data-extra="' + (v.preco_extra || 0) + '" onclick="selVar(this)">' +
          v.nome + extra + '</button>';
      }).join('');
    }
  } catch(e) {}

  // Abrir
  document.getElementById('ov').classList.add('on');
  document.getElementById('sheet').classList.add('on');
  document.body.style.overflow = 'hidden';
}

function shFechar() {
  document.getElementById('ov').classList.remove('on');
  document.getElementById('sheet').classList.remove('on');
  document.body.style.overflow = '';
}

function selVar(btn) {
  document.querySelectorAll('.vbtn').forEach(function(b) { b.classList.remove('on'); });
  btn.classList.add('on');
  shVar = { id: parseInt(btn.dataset.vid), extra: parseFloat(btn.dataset.extra) || 0 };
  atualizarBtnAdd();
}

function qtyChg(d) {
  shQty = Math.max(1, Math.min(99, shQty + d));
  document.getElementById('qVal').textContent = shQty;
  atualizarBtnAdd();
}

function atualizarBtnAdd() {
  if (!shProd) return;
  const sym = loja.simbolo_moeda || 'Kz';
  const extra = shVar ? shVar.extra : 0;
  const total = (shProd.preco_base + extra) * shQty;
  const btn = document.getElementById('shBtnAdd');
  btn.innerHTML = '<i class="fa-solid fa-cart-shopping"></i> Adicionar — ' +
    sym + ' ' + Number(total).toLocaleString('pt');
}

function shAddCart() {
  if (!shProd) return;
  const extra = shVar ? shVar.extra : 0;
  const nota = document.getElementById('notaTa').value.trim();
  const varBtn = document.querySelector('.vbtn.on');
  const item = {
    chave: shProd.id + '-' + Date.now(),
    produto_id: shProd.id,
    variacao_id: shVar ? shVar.id : null,
    nome: shProd.nome,
    nome_variacao: varBtn ? varBtn.textContent.split('+')[0].trim() : null,
    preco: shProd.preco_base + extra,
    quantidade: shQty,
    imagem: shProd.imagem_url || '',
    emoji: '🛍️',
    nota: nota
  };
  const cart = getCart();
  cart.push(item);
  saveCart(cart);
  atualizarNavCart();
  shFechar();
  toast('✓ ' + shProd.nome + ' adicionado!', 'ok');
}

function addDireto(id) {
  const p = prods.find(function(x) { return x.id === parseInt(id); });
  if (!p || p.disponivel === 0) { toast('Produto esgotado!', 'err'); return; }
  const cart = getCart();
  cart.push({
    chave: p.id + '-' + Date.now(),
    produto_id: p.id,
    variacao_id: null,
    nome: p.nome,
    nome_variacao: null,
    preco: p.preco_base,
    quantidade: 1,
    imagem: p.imagem_url || '',
    emoji: '🛍️',
    nota: ''
  });
  saveCart(cart);
  atualizarNavCart();
  toast('✓ ' + p.nome, 'ok');
}

// ── WISHLIST ─────────────────────────────────────────
function getWl() {
  try { return JSON.parse(localStorage.getItem('cf_wl') || '[]'); } catch(e) { return []; }
}
function wlToggle(btn) {
  const id = String(btn.dataset.id);
  let wl = getWl();
  const added = !wl.includes(id);
  if (added) { wl.push(id); } else { wl = wl.filter(function(x) { return x !== id; }); }
  localStorage.setItem('cf_wl', JSON.stringify(wl));
  btn.innerHTML = added ? '<i class="fa-solid fa-heart"></i>' : '<i class="fa-regular fa-heart"></i>';
  btn.classList.toggle('on', added);
  // Update wishlist count
  const wlN = document.getElementById('wlN');
  wlN.textContent = wl.length;
  wlN.style.display = wl.length > 0 ? 'inline' : 'none';
  toast(added ? '❤️ Adicionado à wishlist' : 'Removido da wishlist', 'wl');
}

// ── CARRINHO ─────────────────────────────────────────
function getCart() {
  try { return JSON.parse(localStorage.getItem('cf_carrinho') || '[]'); } catch(e) { return []; }
}
function saveCart(c) { localStorage.setItem('cf_carrinho', JSON.stringify(c)); }
function atualizarNavCart() {
  const q = getCart().reduce(function(s, i) { return s + i.quantidade; }, 0);
  const nN = document.getElementById('nCartN');
  if (nN) { nN.textContent = q; nN.style.display = q > 0 ? 'inline' : 'none'; }
}

// ── DRAWER ───────────────────────────────────────────
function drawerAbrir() {
  document.getElementById('dov').classList.add('on');
  document.getElementById('drawer').classList.add('on');
  document.body.style.overflow = 'hidden';
  if (loja.nome) document.getElementById('drwLogo').textContent = loja.nome;
  // Auth
  const cli = JSON.parse(localStorage.getItem('cf_cliente') || 'null');
  const authEl = document.getElementById('drwAuth');
  if (cli) {
    authEl.innerHTML = '<div class="drw-cli"><div class="drw-cli-n">👤 ' + cli.nome + '</div><div class="drw-cli-e">' + cli.email + '</div></div>';
  } else {
    authEl.innerHTML = '<div class="drw-auth"><p>Cria uma conta para acompanhar as tuas encomendas.</p><a href="conta.html" onclick="drawerFechar()"><i class="fa-solid fa-arrow-right-to-bracket"></i> Entrar / Criar Conta</a></div>';
  }
  // WhatsApp
  const wa = (loja.whatsapp || '').replace(/\D/g, '');
  const waEl = document.getElementById('drwWa');
  if (wa && waEl) {
    waEl.style.display = '';
    waEl.onclick = function() { drawerFechar(); window.open('https://wa.me/' + wa + '?text=Olá!', '_blank'); };
  }
}
function drawerFechar() {
  document.getElementById('dov').classList.remove('on');
  document.getElementById('drawer').classList.remove('on');
  document.body.style.overflow = '';
}
// Swipe sheet
let _sy = 0;
document.getElementById('sheet').addEventListener('touchstart', function(e) { _sy = e.touches[0].clientY; }, { passive: true });
document.getElementById('sheet').addEventListener('touchmove', function(e) { if (e.touches[0].clientY - _sy > 80) shFechar(); }, { passive: true });

// ── TEMA ─────────────────────────────────────────────
function apTema() {
  const t = localStorage.getItem('tema') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('tIco').className = t === 'dark' ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
}
function temaToggle() {
  const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('tema', t);
  document.getElementById('tIco').className = t === 'dark' ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
}

// ── TOAST ─────────────────────────────────────────────
var _tT = null;
function toast(msg, tipo) {
  clearTimeout(_tT);
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (tipo === 'err' ? ' err' : tipo === 'wl' ? ' wl' : '');
  _tT = setTimeout(function() { el.classList.remove('show'); }, 3000);
}
</script>
</body>
