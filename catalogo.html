<script>
// Registar Service Worker — garante sempre ficheiros frescos do servidor
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
// Ouvir mensagem do Service Worker — recarregar quando há nova versão
navigator.serviceWorker.addEventListener('message',function(e){
  if(e.data&&e.data.type==='SW_UPDATED'){
    if(!sessionStorage.getItem('_cf_sw_reloaded')){
      sessionStorage.setItem('_cf_sw_reloaded','1');
      location.reload();
    }
  }
});
// Se catalogo.js falhou (ecrã preto) — detectar e forçar reload sem cache
window.addEventListener('load', function(){
  if(typeof LOJA_DEFAULT==='undefined'||typeof getLoja==='undefined'){
    // catalogo.js não carregou correctamente — limpar cache e recarregar
    if(!sessionStorage.getItem('_cf_reloaded')){
      sessionStorage.setItem('_cf_reloaded','1');
      if('caches' in window){
        caches.keys().then(function(keys){
          return Promise.all(keys.map(function(k){return caches.delete(k);}));
        }).then(function(){
          location.replace(location.pathname+'?_v='+Date.now());
        });
      } else {
        location.replace(location.pathname+'?_v='+Date.now());
      }
    } else {
      // Segunda tentativa falhou — NÃO remover o flag (evita loop infinito)
      // Marcar como 'failed' e mostrar erro visível ao utilizador
      sessionStorage.setItem('_cf_reloaded','failed');
      if(document.body&&!document.getElementById('_cf_load_err')){
        var d=document.createElement('div');
        d.id='_cf_load_err';
        d.style.cssText='position:fixed;inset:0;background:#0d0d1a;color:#ff6b9d;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;z-index:99999';
        d.innerHTML='<div style="font-size:2rem;margin-bottom:12px">⚠️</div><div style="font-size:1rem;font-weight:700;margin-bottom:8px">Erro ao carregar o site</div><div style="font-size:.8rem;opacity:.7;margin-bottom:20px">Verifique a sua ligação à internet e tente novamente.</div><button onclick="sessionStorage.clear();location.reload(true)" style="padding:10px 24px;background:#ff6b9d;border:none;border-radius:50px;color:#fff;font-size:.85rem;cursor:pointer">🔄 Tentar novamente</button>';
        document.body.appendChild(d);
      }
    }
  } else {
    sessionStorage.removeItem('_cf_reloaded');
  }
});
</script>

<script>(function(){
  try{
    var l=JSON.parse(localStorage.getItem('cf_loja')||'{}');
    var n=l.nome;
    if(n){
      // Aplicar imediatamente quando o elemento existir
      function _aplicarNome(){
        document.querySelectorAll('[data-loja-nome]').forEach(function(el){el.textContent=n;});
        var t=document.title;
        if(t&&t.indexOf('CONFETI')>=0)document.title=t.replace('CONFETI',n);
      }
      // Tentar imediatamente + no DOMContentLoaded como fallback
      document.addEventListener('DOMContentLoaded',_aplicarNome);
      // MutationObserver para apanhar elementos criados dinamicamente
      var obs=new MutationObserver(function(){
        var els=document.querySelectorAll('[data-loja-nome]');
        if(els.length){els.forEach(function(el){el.textContent=n;});}
      });
      obs.observe(document.documentElement,{childList:true,subtree:true});
      // Parar observer após carregar
      document.addEventListener('DOMContentLoaded',function(){obs.disconnect();});
    }
  }catch(_){}
})()</script>

<script>
(function(){
  try{
    // Se catalogo.js carregou mas a versão no URL não bate certo com cf_versao → recarregar
    var scripts=document.querySelectorAll('script[src*="catalogo.js"]');
    if(!scripts.length) return;
    var src=scripts[0].getAttribute('src')||'';
    var urlV=parseInt((src.match(/\?v=(\d+)/)||[])[1]||0);
    var lojaV=typeof LOJA_DEFAULT!=='undefined'?(LOJA_DEFAULT.cf_versao||0):0;
    // Se versão do URL é diferente de cf_versao publicado → cache desactualizada → recarregar
    if(urlV>0&&lojaV>0&&urlV!==lojaV){
      var bust='?_v='+lojaV;
      if(location.search!==bust) window.location.replace(location.pathname+bust);
    }
  }catch(_){}
})();
</script>

  <div class="cats"><div class="cats-inner" id="cats-inner"></div></div>
</header>

<div class="result-bar">
  <span id="result-txt">A carregar...</span>
  <div style="display:flex;align-items:center;gap:8px">
    <button class="wl-toggle" id="wl-toggle-btn" onclick="toggleWlView()"><i class="fa-solid fa-heart" style="margin-right:4px"></i>Wishlist</button>
    <div class="view-toggle">
      <button class="vt on" id="vt-grid" onclick="setView('grid')" title="Grelha">⊞</button>
      <button class="vt" id="vt-list" onclick="setView('list')" title="Lista">☰</button>
    </div>
  </div>
</div>

<div class="grid" id="grid"></div>
<div class="empty" id="empty"><div class="ei" id="ei"><i class="fa-solid fa-magnifying-glass"></i></div><p id="em">Nenhum produto encontrado.</p></div>

<div class="overlay" id="overlay" onclick="fecharSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sh-bar"></div>
  <button class="sh-close" onclick="fecharSheet()"><i class="fa-solid fa-xmark"></i> fechar</button>
  <div class="sh-inner">
    <div class="sh-top">
      <div class="sh-img" id="sh-img"></div>
      <div class="sh-info">
        <div class="sh-cat" id="sh-cat"></div>
        <div class="sh-nome" id="sh-nome"></div>
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:2px">
          <span class="sh-preco" id="sh-preco"></span>
          <span class="sh-orig" id="sh-orig" style="display:none"></span>
          <span class="sh-pct" id="sh-pct" style="display:none"></span>
        </div>
        <p class="sh-desc" id="sh-desc"></p>
        <div class="sh-destaques" id="sh-dests"></div>
      </div>
    </div>
    <div id="qty-sec">
      <div class="sh-sec-t">Quantidade</div>
      <div class="qty-row">
        <button class="qty-btn" onclick="qty(-1)">−</button>
        <span class="qty-val" id="qty-val">1</span>
        <button class="qty-btn" onclick="qty(1)">+</button>
      </div>
    </div>
    <div class="sh-sec-t">Personalização / Nota</div>
    <textarea class="sh-nota" id="sh-nota" placeholder="Tema, cor, sabor, data do evento, número de pessoas..."></textarea>
    <div class="sh-btns">
      <button class="btn-sh-det" id="btn-sh-det">Ver detalhes</button>
      <button class="btn-sh-add" id="btn-sh-add" onclick="addCart()"><i class="fa-solid fa-cart-plus" style="margin-right:5px"></i>Adicionar</button>
    </div>
  </div>
</div>

<div class="pers-ov" id="pers-ov">
  <div class="pers-sh">
    <div class="pers-h">✨ Encomenda Especial</div>
    <p class="pers-s">Tem uma ideia especial? Descreva o seu evento e nós criamos algo único para si!</p>
    <textarea class="pers-ta" id="pers-ta" placeholder="Ex: Mesa de doces para casamento de 80 pessoas, tema floral, cores rosa e dourado..."></textarea>
    <button class="btn-pers-env" onclick="enviarPers()">📲 Enviar Pedido pelo WhatsApp</button>
    <button class="btn-pers-c" onclick="fecharPers()">Cancelar</button>
  </div>
</div>

<div class="nav">
  <button class="btn-home-nav" onclick="window.location.href='index.html'"><i class="fa-solid fa-house"></i></button>
  <button class="btn-cart-nav" id="btn-cart" disabled onclick="irCarrinho()">Ver Carrinho</button>
</div>
<div class="toast" id="toast"></div>
<script src="catalogo.js?v=6"></script>
<script>
  let _loja,_cats,_prods,_catA='',_busca='',_ps=null,_qty=1,_viewMode='grid',_wlMode=false;

  document.addEventListener('DOMContentLoaded',async ()=>{
    initTheme();_syncThemeIcons();applyThemeColors();
    // sem gate de login — qualquer pessoa pode ver o catálogo
    await initCatalogo();
    _loja=getLoja();_cats=getCategorias();_prods=getProdutos();
    document.getElementById('hdr-nome').textContent=_loja.nome;
    document.title='Catálogo | '+_loja.nome;
    buildCats();actuCart();actuWlBadge();
    const ini=sessionStorage.getItem('cf_cat_ini');
    if(ini){const btn=document.querySelector(`.cat-btn[data-id="${ini}"]`);if(btn)filtrar(btn,ini);else render();}
    else render();
    sessionStorage.removeItem('cf_cat_ini');
  });

  function buildCats(){
    const bar=document.getElementById('cats-inner'); bar.innerHTML='';
    const all=document.createElement('button');all.className='cat-btn on';all.textContent='Tudo';all.onclick=()=>filtrar(all,'');bar.appendChild(all);
    _cats.forEach(c=>{
      const b=document.createElement('button');b.className='cat-btn';b.dataset.id=c.id;
      b.innerHTML=`${c.emoji} ${c.label}`;b.onclick=()=>filtrar(b,c.id);bar.appendChild(b);
    });
    if(_loja.pedidoPersActivo){const bp=document.createElement('button');bp.className='cat-btn';bp.style.color='var(--coral)';bp.textContent='💌 Especial';bp.onclick=()=>abrirPers();bar.appendChild(bp);}
  }
  function filtrar(btn,cat){document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('on'));if(btn)btn.classList.add('on');_catA=cat;_wlMode=false;document.getElementById('wl-toggle-btn').classList.remove('on');render();}
  function pesquisar(v){_busca=v.trim().toLowerCase();document.getElementById('sclr').classList.toggle('on',!!_busca);_wlMode=false;render();}
  function limparSearch(){document.getElementById('si').value='';pesquisar('');}
  function setView(v){_viewMode=v;document.getElementById('grid').className='grid'+(v==='list'?' list':'');document.getElementById('vt-grid').classList.toggle('on',v==='grid');document.getElementById('vt-list').classList.toggle('on',v==='list');}
  function toggleWlView(){_wlMode=!_wlMode;document.getElementById('wl-toggle-btn').classList.toggle('on',_wlMode);render();}

  function render(){
    const grid=document.getElementById('grid'),empty=document.getElementById('empty');
    let lista=_prods;
    if(_wlMode){
      const wl=getWishlist();lista=lista.filter(p=>wl.includes(p.id));
      if(!lista.length){grid.innerHTML=`<div class="wl-empty" style="grid-column:1/-1"><div class="wl-empty-ico"><i class="fa-solid fa-heart" style="font-size:3rem;opacity:.25;color:var(--pink)"></i></div><p>A sua wishlist está vazia</p><button style="padding:10px 22px;background:var(--grad);border:none;border-radius:50px;font-family:var(--ft);font-size:.78rem;color:#fff;cursor:pointer" onclick="toggleWlView()">Ver Catálogo</button></div>`;empty.style.display='none';document.getElementById('result-txt').textContent='Wishlist';return;}
    } else {
      if(_catA)lista=lista.filter(p=>p.categoria===_catA);
      if(_busca)lista=lista.filter(p=>p.nome.toLowerCase().includes(_busca)||(p.descricao||'').toLowerCase().includes(_busca));
    }
    if(!lista.length){grid.innerHTML='';empty.style.display='block';document.getElementById('result-txt').textContent='0 produtos';return;}
    empty.style.display='none';
    document.getElementById('result-txt').innerHTML=_wlMode?`<i class='fa-solid fa-heart' style='color:var(--pink);margin-right:3px'></i><strong>${lista.length}</strong> guardado${lista.length!==1?'s':''}`:(`<strong>${lista.length}</strong> produto${lista.length!==1?'s':''}`);
    const catMap=Object.fromEntries(_cats.map(c=>[c.id,c.label]));
    grid.innerHTML=lista.map(p=>{
      const pct=p.preco_orig>0?Math.round((1-p.preco/p.preco_orig)*100):0;
      const tag=p.etiqueta||'';const tl={promo:`-${pct}%`,novo:'Novo',destaque:'⭐',especial:'Especial'}[tag]||'';
      const imgH=p.imagem?`<img src="${p.imagem}" alt="" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><span class="pcard-emoji" style="display:none">${p.emoji}</span>`:`<span class="pcard-emoji">${p.emoji}</span>`;
      const precoH=p.preco>0?`<span class="pcard-val">${kz(p.preco)}</span>${p.preco_orig>0?`<span class="pcard-orig">${kz(p.preco_orig)}</span>`:''}`:`<span class="pcard-val orcamento">Pedir orçamento</span>`;
      const wishedClass=isWishlisted(p.id)?'on':'';
      return`<div class="${!p.disponivel?'pcard esgotado':'pcard'}" onclick="openSheet(${p.id})">
        <div class="pcard-img">${imgH}${tag?`<span class="ptag ptag-${tag}">${tl}</span>`:''}
          <button class="btn-wish ${wishedClass}" onclick="event.stopPropagation();doWishlist(${p.id},this)" title="Wishlist"><i class="fa-${isWishlisted(p.id)?'solid':'regular'} fa-heart"></i></button>
        </div>
        <div class="pcard-body">
          <div class="pcard-cat">${catMap[p.categoria]||''}</div>
          <div class="pcard-nome">${p.nome}</div>
          <div class="pcard-preco">${precoH}</div>
        </div>
        <button class="btn-add-quick" onclick="event.stopPropagation();addDireto(${p.id})" title="Adicionar ao carrinho">+</button>
      </div>`;
    }).join('');
  }

  function doWishlist(id,btn){
    const added=toggleWishlist(id);
    btn.innerHTML=added?'<i class="fa-solid fa-heart"></i>':'<i class="fa-regular fa-heart"></i>';
    btn.classList.toggle('on',added);
    actuWlBadge();
    toast(added?'Adicionado à wishlist ❤️':'Removido da wishlist','wl');
  }
  function actuWlBadge(){const n=getWishlist().length;const b=document.getElementById('wl-badge');b.textContent=n;b.classList.toggle('on',n>0);}

  function openSheet(id){
    const p=_prods.find(x=>x.id===id);if(!p)return;
    if(!p.disponivel){toast('Produto esgotado — em breve de volta! 🙈','err');return;}
    if(p.categoria==='especial'){abrirPers();return;}
    _ps=p;_qty=1;
    const si=document.getElementById('sh-img');
    si.innerHTML=p.imagem?`<img src="${p.imagem}" alt="" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><span style="display:none;width:100%;height:100%;align-items:center;justify-content:center;font-size:2.5rem">${p.emoji}</span>`:p.emoji;
    document.getElementById('sh-cat').textContent=_cats.find(c=>c.id===p.categoria)?.label||'';
    document.getElementById('sh-nome').textContent=p.nome;
    const pEl=document.getElementById('sh-preco');
    if(p.preco>0){pEl.textContent=kz(p.preco);pEl.className='sh-preco';}else{pEl.textContent='Pedir orçamento';pEl.className='sh-preco orcamento';}
    const oEl=document.getElementById('sh-orig'),pcEl=document.getElementById('sh-pct');
    if(p.preco_orig>0){oEl.textContent=kz(p.preco_orig);oEl.style.display='';pcEl.textContent=`-${Math.round((1-p.preco/p.preco_orig)*100)}%`;pcEl.style.display='';}
    else{oEl.style.display='none';pcEl.style.display='none';}
    document.getElementById('sh-desc').textContent=p.descricao||'';
    document.getElementById('sh-dests').innerHTML=(p.destaques||[]).map(d=>`<span class="sh-dest-it">✓ ${d}</span>`).join('');
    document.getElementById('qty-val').textContent=1;
    document.getElementById('btn-sh-add').textContent=p.preco>0?`Adicionar — ${kz(p.preco)}`:'Solicitar Orçamento →';
    document.getElementById('sh-nota').value='';
    document.getElementById('btn-sh-det').onclick=()=>irDetalhe(p.id);
    document.getElementById('qty-sec').style.display=p.preco===0?'none':'';
    document.getElementById('overlay').classList.add('on');
    document.getElementById('sheet').classList.add('on');
    document.body.style.overflow='hidden';
  }
  function fecharSheet(){document.getElementById('overlay').classList.remove('on');document.getElementById('sheet').classList.remove('on');document.body.style.overflow='';}
  function qty(d){_qty=Math.max(1,Math.min(99,_qty+d));document.getElementById('qty-val').textContent=_qty;if(_ps?.preco>0)document.getElementById('btn-sh-add').textContent=`Adicionar — ${kz(_ps.preco*_qty)}`;}
  function addCart(){
    if(!_ps)return;
    const nota=document.getElementById('sh-nota').value.trim();
    if(_ps.preco===0){enviarOrcamento(_ps,nota);return;}
    const c=getCarrinho();
    c.push({chave:`${_ps.id}-${Date.now()}`,produto_id:_ps.id,nome:_ps.nome,preco:_ps.preco,quantidade:_qty,imagem:_ps.imagem||'',emoji:_ps.emoji,nota});
    salvarCarrinho(c);fecharSheet();actuCart();toast(`✓ ${_ps.nome} adicionado`,'ok');
  }
  function addDireto(id){
    const p=_prods.find(x=>x.id===id);if(!p)return;
    if(!p.disponivel){toast('Produto esgotado! 🙈','err');return;}
    if(p.categoria==='especial'){abrirPers();return;}
    if(p.preco===0){enviarOrcamento(p,'');return;}
    const c=getCarrinho();c.push({chave:`${p.id}-${Date.now()}`,produto_id:p.id,nome:p.nome,preco:p.preco,quantidade:1,imagem:p.imagem||'',emoji:p.emoji,nota:''});
    salvarCarrinho(c);actuCart();toast(`✓ ${p.nome}`,'ok');
  }
  function enviarOrcamento(p,nota){
    const cli=JSON.parse(localStorage.getItem('cf_cliente')||'{}');
    let m=`💌 *PEDIDO DE ORÇAMENTO — ${_loja.nome}*\n\n*Produto:* ${p.nome}\n`;
    if(nota)m+=`*Detalhes:* ${nota}\n`;
    if(cli.nome)m+=`\n*Cliente:* ${cli.nome} | ${cli.telefone||''}`;
    fecharSheet();window.open(`https://wa.me/${_loja.whatsapp.replace(/\D/g,'')}?text=${encodeURIComponent(m)}`,'_blank');
  }
  function irDetalhe(id){fecharSheet();window.location.href=`produto.html?id=${id}`;}
  function actuCart(){
    const c=getCarrinho(),q=c.reduce((s,i)=>s+i.quantidade,0);
    const btn=document.getElementById('btn-cart');
    if(q>0){btn.disabled=false;btn.innerHTML=`Ver Carrinho <span class="cart-ct">${q}</span>`;}
    else{btn.disabled=true;btn.innerHTML='Ver Carrinho';}
  }
  function irCarrinho(){if(!getCarrinho().length){toast('Carrinho vazio!','err');return;}window.location.href='carrinho.html';}
  function abrirPers(){document.getElementById('pers-ta').value='';document.getElementById('pers-ov').classList.add('on');document.body.style.overflow='hidden';}
  function fecharPers(){document.getElementById('pers-ov').classList.remove('on');document.body.style.overflow='';}
  function enviarPers(){
    const txt=document.getElementById('pers-ta').value.trim();if(!txt){toast('Descreva o pedido.','err');return;}
    const cli=JSON.parse(localStorage.getItem('cf_cliente')||'{}');
    let m=`💌 *ENCOMENDA ESPECIAL — ${_loja.nome}*\n\n${txt}`;
    if(cli.nome)m+=`\n\n👤 ${cli.nome} | ${cli.telefone||''}`;
    fecharPers();window.open(`https://wa.me/${_loja.whatsapp.replace(/\D/g,'')}?text=${encodeURIComponent(m)}`,'_blank');
  }
  let _toastTimer=null;
  function toast(msg,tipo){clearTimeout(_toastTimer);const t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.className='toast show '+(tipo||'ok');_toastTimer=setTimeout(()=>{if(t)t.classList.remove('show');},3200);}
</script>
</body>
</html>
