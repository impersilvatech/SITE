<!DOCTYPE html>
<html lang="pt-AO" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<script>
if('serviceWorker' in navigator){ navigator.serviceWorker.register('./sw.js').catch(function(){}); }
(function(){var t=localStorage.getItem('tema')||'dark';document.documentElement.setAttribute('data-theme',t);})();
</script>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#0d0d1a"/>
<title>Finalizar Pedido</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0d0d1a;--bg2:#14142b;--card:#1a1a32;--border:#2a2a4a;--pink:#ff6b9d;--purple:#b14ae8;--teal:#06d6a0;--yellow:#ffd166;--coral:#ff9f43;--red:#ff4757;--white:#fff;--muted:#9898bb;--muted2:#4a4a6a;--ft:'Fredoka One',cursive;--fb:'Nunito',sans-serif;--r:14px;--tr:all .3s cubic-bezier(.4,0,.2,1);--grad:linear-gradient(135deg,#ff6b9d,#b14ae8)}
[data-theme="light"]{--bg:#fff5f8;--bg2:#fff;--card:#fff;--border:#f0d6e8;--white:#1a0a2e;--muted:#7a5a8a;--muted2:#ccc}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--bg);color:var(--white);min-height:100vh;padding-bottom:40px;transition:background .35s,color .35s}
.hdr{position:sticky;top:0;z-index:100;background:rgba(13,13,26,.97);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px}
[data-theme="light"] .hdr{background:rgba(255,245,248,.97)}
.btn-bk{width:32px;height:32px;border-radius:50%;background:none;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.9rem;cursor:pointer;color:var(--white)}
.hdr-nome{font-family:var(--ft);font-size:1.05rem;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex:1;text-align:center}
.ctn{padding:14px;max-width:560px;margin:0 auto}
/* STEPS */
.steps{display:flex;justify-content:center;align-items:center;gap:0;margin-bottom:20px}
.step{display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;flex:1}
.step::after{content:'';position:absolute;top:13px;left:50%;width:100%;height:2px;background:var(--border);z-index:0}
.step:last-child::after{display:none}
.step-n{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--ft);font-size:.72rem;z-index:1;transition:var(--tr)}
.step-n.done{background:var(--teal);color:#0d0d1a}
.step-n.on{background:var(--grad);color:#fff}
.step-n.off{background:var(--border);color:var(--muted)}
.step-lbl{font-size:.58rem;color:var(--muted);text-align:center}
.step-lbl.on{color:var(--pink)}
/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:12px}
.card-h{font-family:var(--ft);font-size:.95rem;color:var(--pink);margin-bottom:14px;display:flex;align-items:center;gap:8px}
/* GUEST/LOGIN STRIP */
.auth-info{background:rgba(6,214,160,.06);border:1px solid rgba(6,214,160,.2);border-radius:var(--r);padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;font-size:.8rem;color:var(--muted)}
.auth-info i{color:var(--teal);font-size:1.1rem;flex-shrink:0}
.guest-info{background:rgba(255,107,157,.06);border:1px solid rgba(255,107,157,.2);border-radius:var(--r);padding:12px 14px;margin-bottom:12px;font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:10px}
.guest-info i{color:var(--pink);flex-shrink:0}
.guest-info a{color:var(--pink);cursor:pointer}
/* FORM */
.fg{margin-bottom:10px}
.fg label{display:block;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px}
.fi{width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;font-family:var(--fb);font-size:.88rem;color:var(--white);outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--pink)}
.fi::placeholder{color:var(--muted2)}
.fi.err{border-color:var(--red)}
select.fi option{background:var(--bg2);color:var(--white)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* ENTREGA */
.ent-opts{display:flex;gap:8px;margin-bottom:10px}
.eopt{flex:1;padding:10px 8px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);text-align:center;cursor:pointer;transition:var(--tr)}
.eopt.on{border-color:var(--pink);background:rgba(255,107,157,.07)}
.eopt-ico{font-size:1.2rem;margin-bottom:3px}
.eopt-lbl{font-family:var(--ft);font-size:.68rem}
.eopt-preco{font-size:.62rem;color:var(--muted)}
/* RESUMO */
.item-mini{display:flex;align-items:center;gap:10px;padding:8px;background:var(--bg2);border-radius:10px;margin-bottom:7px}
.im-img{width:42px;height:42px;border-radius:8px;background:var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;font-size:1.3rem}
.im-img img{width:100%;height:100%;object-fit:cover}
.im-nome{flex:1;font-family:var(--ft);font-size:.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.im-preco{font-family:var(--ft);font-size:.82rem;color:var(--pink);flex-shrink:0}
.rl{display:flex;justify-content:space-between;font-size:.86rem;color:var(--muted);margin-bottom:7px}
.rl.total{padding-top:10px;margin-top:4px;border-top:1px solid var(--border);font-family:var(--ft);font-size:1.05rem;color:var(--white)}
.rl.total span:last-child{color:var(--pink)}
/* BTN */
.btn-final{width:100%;padding:15px;background:var(--grad);border:none;border-radius:50px;font-family:var(--ft);font-size:.92rem;color:#fff;cursor:pointer;box-shadow:0 4px 14px rgba(255,107,157,.3);margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;transition:var(--tr)}
.btn-final:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn-final:disabled{opacity:.4;cursor:not-allowed;transform:none}
.msg-err{color:var(--red);font-size:.78rem;text-align:center;margin-top:10px}
/* TOAST */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--card);border:1px solid var(--border);border-radius:16px;padding:10px 18px;font-size:.82rem;font-weight:700;text-align:center;max-width:calc(100vw - 32px);z-index:9999;opacity:0;pointer-events:none;transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.err{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<header class="hdr">
  <button class="btn-bk" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
  <div class="hdr-nome">Finalizar Pedido</div>
</header>

<div class="ctn">
  <div class="steps">
    <div class="step"><div class="step-n done"><i class="fa-solid fa-check"></i></div><div class="step-lbl">Carrinho</div></div>
    <div class="step"><div class="step-n on">2</div><div class="step-lbl on">Dados</div></div>
    <div class="step"><div class="step-n off">3</div><div class="step-lbl">Confirmação</div></div>
  </div>

  <div id="authInfo" class="auth-info" style="display:none">
    <i class="fa-solid fa-circle-check"></i>
    <span>Sessão activa como <strong id="authNome"></strong> — dados preenchidos automaticamente.</span>
  </div>
  <div id="guestInfo" class="guest-info" style="display:none">
    <i class="fa-solid fa-circle-info"></i>
    <span>A encomendar como convidado. <a onclick="location.href='conta.html'">Entrar / criar conta →</a></span>
  </div>

  <!-- DADOS PESSOAIS -->
  <div class="card">
    <div class="card-h"><i class="fa-solid fa-user"></i> Dados Pessoais</div>
    <div class="fg"><label>Nome completo *</label><input class="fi" type="text" id="fNome" placeholder="O seu nome"/></div>
    <div class="row2">
      <div class="fg"><label>Email *</label><input class="fi" type="email" id="fEmail" placeholder="email@..."/></div>
      <div class="fg"><label>Telefone *</label><input class="fi" type="tel" id="fTel" placeholder="+244 9XX..."/></div>
    </div>
    <div class="fg"><label>WhatsApp</label><input class="fi" type="tel" id="fWa" placeholder="+244 9XX..."/></div>
  </div>

  <!-- ENTREGA -->
  <div class="card">
    <div class="card-h"><i class="fa-solid fa-truck"></i> Entrega</div>
    <div class="ent-opts" id="entOpts">
      <div class="eopt on" id="eoptLev" onclick="setEnt('levantamento')">
        <div class="eopt-ico">🏪</div><div class="eopt-lbl">Levantamento</div><div class="eopt-preco">Grátis</div>
      </div>
      <div class="eopt" id="eoptEnt" onclick="setEnt('entrega')">
        <div class="eopt-ico">🚚</div><div class="eopt-lbl">Entrega</div><div class="eopt-preco" id="eoptPreco">—</div>
      </div>
    </div>
    <div id="camposEnt" style="display:none">
      <div class="fg"><label>Morada *</label><input class="fi" type="text" id="fMorada" placeholder="Rua, número, bairro"/></div>
      <div class="row2">
        <div class="fg"><label>Cidade</label><input class="fi" type="text" id="fCidade" placeholder="Luanda"/></div>
        <div class="fg"><label>Província</label>
          <select class="fi" id="fProv">
            <option value="">—</option>
            <option>Luanda</option><option>Benguela</option><option>Huambo</option><option>Huíla</option>
            <option>Cabinda</option><option>Bié</option><option>Malanje</option><option>Moxico</option>
            <option>Cuando Cubango</option><option>Cunene</option><option>Namibe</option><option>Zaire</option>
            <option>Uíge</option><option>Kwanza Norte</option><option>Kwanza Sul</option>
            <option>Lunda Norte</option><option>Lunda Sul</option><option>Bengo</option>
          </select>
        </div>
      </div>
    </div>
    <div class="fg"><label>Notas / Observações</label><input class="fi" type="text" id="fNotas" placeholder="Horário preferido, referência, etc."/></div>
  </div>

  <!-- RESUMO -->
  <div class="card">
    <div class="card-h"><i class="fa-solid fa-receipt"></i> Resumo</div>
    <div id="resumoItens"></div>
    <div class="rl total"><span>Total</span><span id="totalFinal">—</span></div>
  </div>

  <button class="btn-final" id="btnFinal" onclick="submeter()">
    <i class="fa-solid fa-check-double"></i> Confirmar Pedido
  </button>
  <p class="msg-err" id="msgErr"></p>
</div>

<div class="toast" id="toast"></div>

<script src="catalogo.js?v=6"></script>
<script>
let _loja = {}, tipoEntrega = localStorage.getItem('ist_entrega') || 'levantamento';

document.addEventListener('DOMContentLoaded', async () => {
  initTheme(); _syncThemeIcons();
  await initCatalogo();
  _loja = getLoja();

  // Verificar carrinho
  if (!getCarrinho().length) { location.href = 'carrinho.html'; return; }

  // Entrega
  const ePreco = document.getElementById('eoptPreco');
  if (_loja.entrega_preco > 0) ePreco.textContent = kz(_loja.entrega_preco);
  else ePreco.textContent = 'Grátis';
  if (!_loja.entrega_ativa) document.getElementById('eoptEnt').style.display = 'none';
  setEnt(tipoEntrega);

  // Verificar sessão
  const cli = getCliente();
  if (cli) {
    document.getElementById('authInfo').style.display = 'flex';
    document.getElementById('authNome').textContent = cli.nome;
    document.getElementById('fNome').value = cli.nome || '';
    document.getElementById('fEmail').value = cli.email || '';
  } else {
    document.getElementById('guestInfo').style.display = 'flex';
  }

  renderResumo();
});

function setEnt(t) {
  tipoEntrega = t;
  localStorage.setItem('ist_entrega', t);
  document.getElementById('eoptLev').classList.toggle('on', t === 'levantamento');
  document.getElementById('eoptEnt').classList.toggle('on', t === 'entrega');
  document.getElementById('camposEnt').style.display = t === 'entrega' ? '' : 'none';
  renderResumo();
}

function renderResumo() {
  const c = getCarrinho();
  const cont = document.getElementById('resumoItens');
  cont.innerHTML = c.map(i => `
    <div class="item-mini">
      <div class="im-img">${i.imagem ? `<img src="${i.imagem}" alt="">` : i.emoji || '🛍️'}</div>
      <div class="im-nome">${i.nome}${i.nota ? ` <span style="font-size:.68rem;color:var(--muted)">(${i.nota})</span>` : ''} × ${i.quantidade}</div>
      <div class="im-preco">${kz(i.preco * i.quantidade)}</div>
    </div>`).join('');
  const sub = c.reduce((s, i) => s + i.preco * i.quantidade, 0);
  const gratis = _loja.entrega_gratis > 0 && sub >= _loja.entrega_gratis;
  const ent = tipoEntrega === 'entrega' && !gratis ? (_loja.entrega_preco || 0) : 0;
  document.getElementById('totalFinal').textContent = kz(sub + ent);
}

async function submeter() {
  const btn = document.getElementById('btnFinal');
  const msg = document.getElementById('msgErr');
  msg.textContent = '';

  const nome = document.getElementById('fNome').value.trim();
  const email = document.getElementById('fEmail').value.trim();
  const tel = document.getElementById('fTel').value.trim();
  const wa = document.getElementById('fWa').value.trim();
  const notas = document.getElementById('fNotas').value.trim();
  const morada = document.getElementById('fMorada').value.trim();
  const cidade = document.getElementById('fCidade').value.trim();
  const prov = document.getElementById('fProv').value;

  if (!nome) { msg.textContent = 'Nome obrigatório.'; document.getElementById('fNome').classList.add('err'); return; }
  if (!email || !email.includes('@')) { msg.textContent = 'Email inválido.'; document.getElementById('fEmail').classList.add('err'); return; }
  if (!tel) { msg.textContent = 'Telefone obrigatório.'; document.getElementById('fTel').classList.add('err'); return; }
  if (tipoEntrega === 'entrega' && !morada) { msg.textContent = 'Morada obrigatória para entrega.'; document.getElementById('fMorada').classList.add('err'); return; }

  const c = getCarrinho();
  if (!c.length) { msg.textContent = 'Carrinho vazio.'; return; }

  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> A processar...';

  const sub = c.reduce((s, i) => s + i.preco * i.quantidade, 0);
  const gratis = _loja.entrega_gratis > 0 && sub >= _loja.entrega_gratis;
  const precoEnt = tipoEntrega === 'entrega' && !gratis ? (_loja.entrega_preco || 0) : 0;

  const itens = c.map(i => ({
    produto_id: i.produto_id || i.id,
    variacao_id: i.variacao_id || null,
    nome_produto: i.nome,
    nome_variacao: i.nome_variacao || null,
    preco_unit: i.preco,
    quantidade: i.quantidade
  }));

  try {
    const d = await criarEncomenda({
      nome_cliente: nome, email_cliente: email,
      telefone_cliente: tel, whatsapp_cliente: wa || tel,
      morada_entrega: morada, cidade_entrega: cidade,
      provincia_entrega: prov, tipo_entrega: tipoEntrega,
      notas: notas, itens: itens
    });

    localStorage.setItem('ist_ref', d.ref);
    localStorage.setItem('ist_total', d.total);
    localStorage.setItem('ist_nome', nome);
    localStorage.setItem('ist_wa', wa || tel);
    limparCarrinho();
    localStorage.removeItem('ist_entrega');
    location.href = 'confirmacao.html';
  } catch(e) {
    msg.textContent = e.message || 'Erro de ligação. Tente novamente.';
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-check-double"></i> Confirmar Pedido';
  }
}

document.querySelectorAll('.fi').forEach(el => {
  el.addEventListener('input', () => el.classList.remove('err'));
});

let _tT = null;
function toast(msg, t) {
  clearTimeout(_tT);
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + (t||'err');
  _tT = setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
</body>
</html>
